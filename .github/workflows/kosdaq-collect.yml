name: kosdaq-collect

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "list-only | financials | prices | all"
        default: "all"
  push:
    paths: ["run/kosdaq-trigger.txt"]   # 이 파일을 수정해 push하면 실행됨 (원격 트리거용)

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install finance-datareader pykrx pandas pyarrow requests python-dotenv

      - name: Stage 1 — 자격 게이트 + DART 재무
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python qa/collect_kosdaq.py

      - name: Commit financials
        run: |
          git config user.name "kosdaq-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "kosdaq: financials $(date -u +%Y-%m-%d)"
          git push || true

      - name: Stage 2 — 시세 10년 + 주식수
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          TICKERS=$(python -c "import pandas as pd; print(','.join(pd.read_csv('data/constituents/kosdaq_eligible.csv',dtype={'ticker':str})['ticker']))")
          python qa/collect_prices_no_krx.py --tickers "$TICKERS"

      - name: Commit prices
        run: |
          git add data/
          git diff --cached --quiet || git commit -m "kosdaq: prices $(date -u +%Y-%m-%d)"
          git push || true
