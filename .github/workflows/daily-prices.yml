name: daily-prices

on:
  schedule:
    # 매 개장일 장마감 후 — 16:10 KST = 07:10 UTC (월~금)
    - cron: "50 6 * * 1-5"
  workflow_dispatch: {}   # 수동 실행 버튼도 활성화

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install finance-datareader pykrx

      - name: Collect prices
        run: python qa/update_daily_prices.py

      - name: Commit & push if changed
        run: |
          git config user.name "price-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/live/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "prices: $(date -u +%Y-%m-%d) auto update"
            git push
          fi
